# Production compose file with no host-exposed Postgres/Redis ports and no
# insecure secret fallbacks. Use with:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16
    container_name: digital-cigarette-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: digital-cigarette-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: digital-cigarette-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT:-6823}
      NODE_ENV: production
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-false}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_ISSUER: ${JWT_ISSUER:-digital-cigarette-break-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-digital-cigarette-break-app}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-relax_refresh_token}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-true}
      AUTH_REFRESH_COOKIE_SAME_SITE: ${AUTH_REFRESH_COOKIE_SAME_SITE:-none}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SWAGGER_PUBLIC: ${SWAGGER_PUBLIC:-false}
      SWAGGER_BASIC_USER: ${SWAGGER_BASIC_USER:-}
      SWAGGER_BASIC_PASSWORD: ${SWAGGER_BASIC_PASSWORD:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-public-assets}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_URL: ${SMTP_URL:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      APNS_PRIVATE_KEY: ${APNS_PRIVATE_KEY:-}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      APPLE_SHARED_SECRET: ${APPLE_SHARED_SECRET:-}
      APP_STORE_CONNECT_API_KEY: ${APP_STORE_CONNECT_API_KEY:-}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}
      SEPAY_MERCHANT_ID: ${SEPAY_MERCHANT_ID:-}
      SEPAY_SECRET_KEY: ${SEPAY_SECRET_KEY:-}
      SEPAY_WEBHOOK_API_KEY: ${SEPAY_WEBHOOK_API_KEY:-}
      DEMO_MODE_ENABLED: ${DEMO_MODE_ENABLED:-false}
    ports:
      - "${BACKEND_PORT:-6823}:6823"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:6823/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: digital-cigarette-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "${WEB_PORT:-3233}:3233"

volumes:
  postgres_data:
  redis_data:
