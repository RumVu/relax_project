services:
  postgres:
    image: postgres:16
    container_name: digital-cigarette-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-digital_cigarette_break}
    ports:
      - "${POSTGRES_PORT:-5555}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-digital_cigarette_break}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: digital-cigarette-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    # `backend` chạy ở cả profile "api" (chỉ backend, frontend live trên Vercel)
    # và profile "app"/"full" (full stack local). Chọn:
    #   docker compose --profile api  up -d --build   # frontend = Vercel
    #   docker compose --profile full up -d --build   # frontend = local docker
    profiles: ["app", "full", "api"]
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: digital-cigarette-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT:-6823}
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-digital_cigarette_break}?schema=public
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: redis://redis:6379
      # Local compose fallback only. Production uses docker-compose.prod.yml,
      # where JWT_SECRET is required and has no default.
      JWT_SECRET: ${JWT_SECRET:-local-compose-jwt-9f8c7e6d5b4a3210f1e2d3c4b5a69788}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_ISSUER: ${JWT_ISSUER:-digital-cigarette-break-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-digital-cigarette-break-app}
      # Supabase Storage — chứa avatar, ảnh project, sound assets.
      # Backend dùng SECRET_KEY (sb_secret_*) để issue signed-upload-url,
      # frontend dùng PUBLISHABLE_KEY (sb_publishable_*) để read.
      # Để rỗng → StorageService no-op (upload sẽ fail rõ ràng).
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-public-assets}
      # Google Client ID PUBLIC (an toàn commit). Override bằng env nếu xài dự án khác.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-627379199532-4o73eb98p9s6l70dav8s4l8qujja1ljr.apps.googleusercontent.com}
      # CORS mặc định: localhost dev + Vercel production web.
      # `make share-vercel` sẽ override để bồi thêm tunnel + reaffirm Vercel URL.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3233,https://relax-project-web-dashboard.vercel.app}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Dev/demo can opt into public docs with SWAGGER_PUBLIC=true. Production
      # should use SWAGGER_PUBLIC=false + basic auth, or disable Swagger.
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_PUBLIC: ${SWAGGER_PUBLIC:-false}
      SWAGGER_BASIC_USER: ${SWAGGER_BASIC_USER:-}
      SWAGGER_BASIC_PASSWORD: ${SWAGGER_BASIC_PASSWORD:-}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-relax_refresh_token}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-}
      AUTH_REFRESH_COOKIE_SAME_SITE: ${AUTH_REFRESH_COOKIE_SAME_SITE:-}
    ports:
      - "${BACKEND_PORT:-6823}:6823"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:6823/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Tailscale Funnel — expose backend ra internet qua URL CỐ ĐỊNH
  # (`<TS_HOSTNAME>.<tailnet>.ts.net`). Khác Cloudflare quick-tunnel: URL
  # KHÔNG đổi giữa các restart. Free tier OK cho 1 service.
  #
  # Profile riêng `funnel` (không phải `api`) để a vẫn có thể chạy backend
  # mà KHÔNG mở public — chỉ thêm `--profile funnel` khi cần.
  #
  # Setup 1 lần duy nhất:
  #   1. Tạo Tailscale account: https://login.tailscale.com/start
  #   2. Admin → DNS → enable "HTTPS Certificates"
  #   3. Admin → Settings → "Funnel" → add machine to ACL với `funnel` access
  #   4. Tạo auth key (reusable): admin → Settings → Keys
  #   5. Set TS_AUTHKEY=tskey-auth-... trong env hoặc .env
  #   6. `docker compose --profile api --profile funnel up -d`
  # Lần sau: docker auto-restart container, URL giữ nguyên.
  tailscale:
    profiles: ["funnel"]
    image: tailscale/tailscale:latest
    container_name: digital-cigarette-tailscale
    hostname: ${TS_HOSTNAME:-relax-backend}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: ${TS_HOSTNAME:-relax-backend}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: --accept-routes
      # Funnel config — ${TS_CERT_DOMAIN} resolves to <hostname>.<tailnet>.ts.net
      # tại runtime. Image substitute giúp em.
      TS_SERVE_CONFIG: /config/funnel.json
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./docker/tailscale/funnel.json:/config/funnel.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tailscale status >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Web container chỉ chạy khi a muốn full-stack local (LAN sharing, dev offline).
  # Luồng production: frontend ở Vercel (https://relax-project-web-dashboard.vercel.app)
  # → bỏ qua service này, chỉ chạy `docker compose --profile api up`.
  web:
    profiles: ["app", "full"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6823}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-627379199532-4o73eb98p9s6l70dav8s4l8qujja1ljr.apps.googleusercontent.com}
    container_name: digital-cigarette-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6823}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-627379199532-4o73eb98p9s6l70dav8s4l8qujja1ljr.apps.googleusercontent.com}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${WEB_PORT:-3233}:3233"

volumes:
  postgres_data:
  redis_data:
  # tailscale_state persists the device identity + key so the same machine
  # rejoins the tailnet with the same URL after every restart. Wipe this
  # volume → new identity → new URL (rare, only when you want to rotate).
  tailscale_state:
