name: Web CI

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Check generated OpenAPI types
        run: test -s apps/web/lib/generated/openapi-types.ts && grep -q '"/v1/auth/login"' apps/web/lib/generated/openapi-types.ts
      - run: npm --workspace apps/web run lint
      - run: npm --workspace apps/web run build
      - name: Install Playwright browsers
        run: npm --workspace apps/web run test:e2e:install
      - name: Playwright smoke
        run: npm --workspace apps/web run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
