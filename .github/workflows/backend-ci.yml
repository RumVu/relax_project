name: Backend CI

on:
  push:
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: digital_cigarette_break
        ports:
          - 5555:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d digital_cigarette_break"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:123456@localhost:5555/digital_cigarette_break?schema=public
      JWT_SECRET: ci-jwt-signing-key-with-more-than-32-characters
      JWT_EXPIRES_IN: 15m
      JWT_ISSUER: digital-cigarette-break-api
      JWT_AUDIENCE: digital-cigarette-break-app
      REDIS_URL: redis://localhost:6379
      REDIS_ENABLED: "true"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm --workspace apps/backend run prisma:migrate:deploy
      - run: npm --workspace apps/backend run prisma:seed
      - run: npm --workspace apps/backend run prisma:generate
      - run: npm --workspace apps/backend run prisma:validate
      - run: npm --workspace apps/backend run lint
      - run: npm --workspace apps/backend test -- --runInBand
      - run: npm --workspace apps/backend run test:e2e -- --runInBand
      - run: npm --workspace apps/backend run build
      - run: npm audit --workspace apps/backend --audit-level=high
