name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile/relax_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos

  build-apk:
    name: Build APK (debug)
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: apps/mobile/relax_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: relax-app-debug
          path: apps/mobile/relax_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
