name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile/relax_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos

  test:
    name: Flutter test
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: apps/mobile/relax_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter test --no-pub

  build-android:
    name: Build Android (release appbundle)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/mobile/relax_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Create signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
            echo "$KEY_PROPERTIES" > android/key.properties
          fi
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v7
        with:
          name: relax-app-release-aab
          path: apps/mobile/relax_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: test
    defaults:
      run:
        working-directory: apps/mobile/relax_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build ios --no-codesign --release
